<div class="main-container">
  <app-profile-header [data]="profile"></app-profile-header>
  
  <app-social-links></app-social-links>

  <app-portfolio-card></app-portfolio-card>

  <section class="links-section">
    <p class="section-title">Meus Projetos em Vídeo</p>
    
    @for (video of videoProjects; track video.youtubeId) {
      <app-link-card 
        [item]="video" 
        [isOpen]="activeVideo === video.youtubeId"
        (clickCard)="toggleVideo(video.youtubeId)">
      </app-link-card>
    }
  </section>
</div>
